        :root {
            --bg: #0f172a;

            --border: rgba(255,255,255,0.12);
            --shadow: 0 16px 40px rgba(0,0,0,0.35);
            --radius: 18px;

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
            color: var(--text);
            min-height: 100vh;

        .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .brand h1 { margin: 0; font-size: 28px; }
        .brand p { margin: 0; color: var(--muted); font-size: 14px; }
        
        .pill { padding: 6px 12px; border-radius: 999px; background: rgba(96,165,250,0.12); border: 1px solid rgba(96,165,250,0.25); color: #bfdbfe; font-size: 12px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
        .card { background: rgba(17,24,39,0.9); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
        .hidden { display: none !important; }

        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card-2); color: white; margin-top: 5px; }
        
        .btnbar { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        button { border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; }
        .btn-primary { background: var(--primary-2); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); }
        .btn-danger { background: var(--danger); }
        .btn-gray { background: #4b5563; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab { background: #374151; opacity: 0.6; }
        .tab.active { opacity: 1; background: var(--primary-2); }

        .list-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Status Cores */
        .status-red { border-left: 5px solid var(--danger); }
        .status-yellow { border-left: 5px solid var(--warning); }
        .indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .bg-red { background: var(--danger); }
        .bg-yellow { background: var(--warning); }

        .notice { padding: 15px; border-radius: 10px; margin: 10px 0; font-weight: bold; }
        .info { background: rgba(59, 130, 246, 0.2); color: #93c5fd; }
    </style>
</head>

// ===== SISTEMA DE FOCO NOS JOGOS =====

let currentGameInterval = null;

function closeGame() {

    document.getElementById('gameOverlay').style.display = 'none';

    if(currentGameInterval) {
        clearInterval(currentGameInterval);
    }

    document.onkeydown = null;
}

function openGame(title, html) {

    document.getElementById('gameOverlay').style.display = 'block';

    document.getElementById('gameTitle').innerText = title;

    document.getElementById('gameContainer').innerHTML = html;
}

// ===== SNAKE =====

function openSnake() {

    openGame(
        "🐍 Snake",
        `
        <canvas
            id="snakeCanvas"
            width="500"
            height="500"
            style="background:black;border-radius:12px;"
        ></canvas>
        `
    );

    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');

    let snake = [{x:250,y:250}];

    let food = {
        x:100,
        y:100
    };

    let dx = 20;
    let dy = 0;

    document.onkeydown = (e) => {

        if(e.key === 'ArrowUp') {
            dx = 0;
            dy = -20;
        }

        if(e.key === 'ArrowDown') {
            dx = 0;
            dy = 20;
        }

        if(e.key === 'ArrowLeft') {
            dx = -20;
            dy = 0;
        }

        if(e.key === 'ArrowRight') {
            dx = 20;
            dy = 0;
        }
    };

    currentGameInterval = setInterval(() => {

        ctx.clearRect(0,0,500,500);

        const head = {
            x: snake[0].x + dx,
            y: snake[0].y + dy
        };

        snake.unshift(head);

        if(head.x === food.x && head.y === food.y) {

            food.x = Math.floor(Math.random()*25)*20;
            food.y = Math.floor(Math.random()*25)*20;

        } else {

            snake.pop();
        }

        ctx.fillStyle = "lime";

        snake.forEach(part => {
            ctx.fillRect(part.x, part.y, 20, 20);
        });

        ctx.fillStyle = "red";

        ctx.fillRect(food.x, food.y, 20, 20);

    }, 100);
}

// ===== HISTORY =====

function openHistory() {

    openGame(
        "🟥 Dont Forget Hystory",
        `
        <canvas
            id="historyCanvas"
            width="500"
            height="500"
            style="background:#111;border-radius:12px;"
        ></canvas>
        `
    );

    const canvas = document.getElementById('historyCanvas');
    const ctx = canvas.getContext('2d');

    let player = {
        x:20,
        y:240
    };

    const goal = {
        x:450,
        y:200,
        w:30,
        h:100
    };

    const walls = [
        {x:120,y:0,w:20,h:350},
        {x:250,y:150,w:20,h:350},
        {x:350,y:0,w:20,h:300}
    ];

    document.onkeydown = (e) => {

        if(e.key === 'w') player.y -= 10;
        if(e.key === 's') player.y += 10;
        if(e.key === 'a') player.x -= 10;
        if(e.key === 'd') player.x += 10;
    };

    currentGameInterval = setInterval(() => {

        ctx.clearRect(0,0,500,500);

        ctx.fillStyle = "green";

        ctx.fillRect(goal.x,goal.y,goal.w,goal.h);

        ctx.fillStyle = "red";

        walls.forEach(w => {
            ctx.fillRect(w.x,w.y,w.w,w.h);
        });

        ctx.fillStyle = "white";

        ctx.fillRect(player.x,player.y,20,20);

        walls.forEach(w => {

            if(
                player.x < w.x+w.w &&
                player.x+20 > w.x &&
                player.y < w.y+w.h &&
                player.y+20 > w.y
            ) {

                player.x = 20;
                player.y = 240;
            }
        });

        if(player.x > 440) {

            alert("Você venceu!");

            player.x = 20;
            player.y = 240;
        }

    }, 30);
}
    
    const user = db.accounts.find(a => a.user === u && a.pass === p && a.role === type);

    if(user) {

        document.getElementById('loginView').classList.add('hidden');

}

function createAccount() {
    const user = document.getElementById('newUser').value;
    const pass = document.getElementById('newPass').value;
    const role = document.getElementById('newRole').value;
    
    if(!user || !pass) return alert("Preencha tudo");

    alert("Conta criada! Já pode logar.");
    toggleCreateAccount();
}

// --- LÓGICA DO BANHEIRO ---
function sendToBathroom() {
    const name = document.getElementById('studentName').value.trim();
    if(!name) return;

    // Verificar se já saiu mais cedo (Bloqueio Gestão)
    if(db.earlyExits.includes(name)) {
        document.getElementById('bathroomMsg').innerHTML = `<div class="notice btn-danger">Saída bloqueada: Aluno já saiu hoje mais cedo</div>`;
        return;
    }

    const log = {
        name,
        time: new Date().toLocaleTimeString(),
        date: new Date().toLocaleDateString(),
        returned: false,
        timestamp: Date.now()
    };

    db.bathroomLogs.push(log);
    save();
    renderAll();
    document.getElementById('studentName').value = "";
}

function returnFromBathroom() {
    const name = prompt("Nome do aluno que voltou:");
    const record = db.bathroomLogs.find(l => l.name.toLowerCase() === name.toLowerCase() && !l.returned);
    if(record) {
        record.returned = true;
        save();
        renderAll();
    }
}

// --- LÓGICA DE PRESENÇA ---
function markAttendance(name, type) {
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    let msg = "";

    if(type === 'chegada') {
        if(timeStr <= "07:10") msg = "Chegada em horário normal";
        else if(timeStr >= "07:50") msg = "Chegada na segunda aula, atrasado";
        else msg = "Chegada com atraso leve";
    } else {
        if(timeStr >= "12:20") msg = "Saída em horário normal";
        else msg = "Saída antecipada registrada";
    }

    db.attendance.push({name, type, time: timeStr, msg, date: now.toLocaleDateString()});
    save();
    document.getElementById('presencaMsg').innerHTML = `<div class="notice info">${name}: ${msg}</div>`;
}

function markEarlyExit(name) {
    if(!db.earlyExits.includes(name)) {
        db.earlyExits.push(name);
        save();
        renderAll();
        alert(`Saída antecipada de ${name} bloqueada no sistema de banheiro.`);
    }
}

// --- RENDERIZAÇÃO ---
function renderAll() {
    // Lista Banheiro Ativa
    const activeList = document.getElementById('activeBathroomList');
    const currentlyOut = db.bathroomLogs.filter(l => !l.returned);
    activeList.innerHTML = currentlyOut.map(l => `<div class="list-item"><span>${l.name} (Saiu às ${l.time})</span><span class="pill">No banheiro</span></div>`).join('');

    // Lista Presença
    const attList = document.getElementById('studentAttendanceList');
    attList.innerHTML = students.map(s => `
        <div class="list-item">
            <strong>${s}</strong>
            <div class="btnbar">
                <button class="btn-primary" onclick="markAttendance('${s}', 'chegada')">Chegada</button>
                <button class="btn-warning" onclick="markAttendance('${s}', 'saida')">Saída</button>
                ${currentUser.role === 'gestao' ? `<button class="btn-danger" onclick="markEarlyExit('${s}')">Bloquear Banheiro (Saiu Cedo)</button>` : ''}
            </div>
        </div>
    `).join('');

    // Relatórios Gestão
    if(currentUser.role === 'gestao') {
        const reportB = document.getElementById('reportBathroom');
        // Agrupar saídas por nome
        const counts = {};
        db.bathroomLogs.forEach(l => counts[l.name] = (counts[l.name] || 0) + 1);

        reportB.innerHTML = Object.keys(counts).map(name => {
            let colorClass = "";
            if(counts[name] >= 3) colorClass = "status-red";
            else if(counts[name] >= 2) colorClass = "status-yellow";
            
            return `<div class="list-item ${colorClass}">
                <span>${name} - Saídas hoje: <strong>${counts[name]}</strong></span>
                ${counts[name] >= 3 ? '<span class="bg-red indicator"></span>' : (counts[name] >= 2 ? '<span class="bg-yellow indicator"></span>' : '')}
            </div>`;
        }).join('');
    }
}

// --- UTILITÁRIOS ---
function save() {
    localStorage.setItem('esc_acc', JSON.stringify(db.accounts));
    localStorage.setItem('esc_bath', JSON.stringify(db.bathroomLogs));
    localStorage.setItem('esc_att', JSON.stringify(db.attendance));
    localStorage.setItem('esc_early', JSON.stringify(db.earlyExits));
}

function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('hidden');
    document.getElementById('tabBtn' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
}

function toggleCreateAccount() {
    document.getElementById('createAccountSection').classList.toggle('hidden');
}

function logout() { location.reload(); }

</script>
