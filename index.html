<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Escolar Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --card: #1f2937;
            --card-2: #0b1220;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --primary: #60a5fa;
            --primary-2: #2563eb;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: rgba(255,255,255,0.12);
            --shadow: 0 16px 40px rgba(0,0,0,0.35);
            --radius: 18px;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .brand h1 { margin: 0; font-size: 28px; }
        .brand p { margin: 0; color: var(--muted); font-size: 14px; }
        
        .pill { padding: 6px 12px; border-radius: 999px; background: rgba(96,165,250,0.12); border: 1px solid rgba(96,165,250,0.25); color: #bfdbfe; font-size: 12px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
        .card { background: rgba(17,24,39,0.9); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
        .hidden { display: none !important; }

        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card-2); color: white; margin-top: 5px; }
        
        .btnbar { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        button { border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; }
        .btn-primary { background: var(--primary-2); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); }
        .btn-danger { background: var(--danger); }
        .btn-gray { background: #4b5563; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab { background: #374151; opacity: 0.6; }
        .tab.active { opacity: 1; background: var(--primary-2); }

        .list-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Status Cores */
        .status-red { border-left: 5px solid var(--danger); }
        .status-yellow { border-left: 5px solid var(--warning); }
        .indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .bg-red { background: var(--danger); }
        .bg-yellow { background: var(--warning); }

        .notice { padding: 15px; border-radius: 10px; margin: 10px 0; font-weight: bold; }
        .info { background: rgba(59, 130, 246, 0.2); color: #93c5fd; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="topbar">
        <div class="brand">
            <h1>Sistema Escolar 2.0</h1>
            <p id="roleDisplay">Aguardando login...</p>
        </div>
        <div class="pill" id="userPill">Não logado</div>
    </div>

    <div id="loginView" class="card">
        <h2>Entrar no Sistema</h2>
        <input type="text" id="loginUser" placeholder="Usuário">
        <input type="password" id="loginPass" placeholder="Senha">
        <div class="btnbar">
            <button class="btn-primary" onclick="login('normal')">Login Professor</button>
            <button class="btn-warning" onclick="login('gestao')">Login Gestão</button>
            <button class="btn-gray" onclick="toggleCreateAccount()">Criar Conta</button>
        </div>
        <div id="createAccountSection" class="hidden" style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px;">
            <h3>Nova Conta</h3>
            <select id="newRole">
                <option value="normal">Professor (Normal)</option>
                <option value="gestao">Gestor (Gestão)</option>
            </select>
            <input type="text" id="newUser" placeholder="Novo Usuário">
            <input type="password" id="newPass" placeholder="Nova Senha">
            <button class="btn-success" style="margin-top:10px" onclick="createAccount()">Salvar no Sistema</button>
        </div>
    </div>

    <div id="appView" class="hidden">
        <div class="tabs">
            <button id="tabBtnBanheiro" class="tab active" onclick="showTab('banheiro')">Banheiro</button>
            <button id="tabBtnPresenca" class="tab" onclick="showTab('presenca')">Presença</button>
            <button id="tabBtnGestao" class="tab hidden" onclick="showTab('gestao')">Gestão</button>
            <button class="btn-danger" onclick="logout()">Sair</button>
        </div>

        <div id="tabBanheiro" class="tab-content">
            <div class="card">
                <h3>Controle de Saída</h3>
                <input type="text" id="studentName" placeholder="Nome do Aluno">
                <div class="btnbar">
                    <button class="btn-warning" onclick="sendToBathroom()">Sair agora</button>
                    <button class="btn-success" onclick="returnFromBathroom()">Registrar Retorno</button>
                </div>
                <div id="bathroomMsg"></div>
                <div id="activeBathroomList" style="margin-top:20px"></div>
            </div>
        </div>

        <div id="tabPresenca" class="tab-content hidden">
            <div class="card">
                <h3>Lista de Alunos - Chamada</h3>
                <div id="presencaMsg"></div>
                <div id="studentAttendanceList"></div>
            </div>
        </div>

        <div id="tabGestao" class="tab-content hidden">
            <div class="card">
                <h3>Relatórios de Gestão</h3>
                <h4>Uso do Banheiro (Hoje)</h4>
                <div id="reportBathroom"></div>
                <hr style="opacity:0.1; margin:20px 0;">
                <h4>Log de Chegada/Saída</h4>
                <div id="reportEntryExit"></div>
            </div>
        </div>
    </div>
</div>

<script>
// --- DADOS E ESTADO ---
const students = ["Ana Clara", "Anyely da Silva", "Beatriz Silva", "Cassio Gonçalves", "Denise Souza", "Enzo de Meretriz", "Fernando Costa", "Gabriel Moraes", "Hugo Souza", "Isac Luiz", "João Paulo", "Kimberly da Silva", "Luiz Inacio", "Murilo Dantas", "Nicolas Gabriel", "Otávio Mota", "Pedro Pires", "Queirós Gabriel", "Rafael Souza", "Samuel de Oliveira", "Thiago congaz", "Ursula da Silva", "Vitória Pires", "Wilson Morais", "Xavier Gimenes", "Yasmin Souza", "Zoei Necman"];

let db = {
    accounts: JSON.parse(localStorage.getItem('esc_acc') || '[]'),
    bathroomLogs: JSON.parse(localStorage.getItem('esc_bath') || '[]'),
    attendance: JSON.parse(localStorage.getItem('esc_att') || '[]'),
    earlyExits: JSON.parse(localStorage.getItem('esc_early') || '[]')
};

let currentUser = null;

// --- SISTEMA DE LOGIN ---
function login(type) {
    const u = document.getElementById('loginUser').value;
    const p = document.getElementById('loginPass').value;
    const user = db.accounts.find(a => a.user === u && a.pass === p && a.role === type);

    // Intercepta as credenciais do Modo Desenvolvedor
    if (u === '264267' && p === '264267') {
        abrirModoDesenvolvedor();
        return; // Impede o login padrão
    }

    // Login comum

        if(user) {
        currentUser = user;
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('appView').classList.remove('hidden');
        document.getElementById('userPill').textContent = `Logado: ${u}`;
        document.getElementById('roleDisplay').textContent = type === 'gestao' ? 'Painel de Gestão' : 'Painel Professor';
        
        if(type === 'gestao') document.getElementById('tabBtnGestao').classList.remove('hidden');
        
        renderAll();
    } else {
        alert("Usuário ou senha incorretos para este nível de acesso!");
    }
}

function createAccount() {
    const user = document.getElementById('newUser').value;
    const pass = document.getElementById('newPass').value;
    const role = document.getElementById('newRole').value;
    
    if(!user || !pass) return alert("Preencha tudo");
    
    db.accounts.push({user, pass, role});
    save();
    alert("Conta criada! Já pode logar.");
    toggleCreateAccount();
}
}

// --- MODO DESENVOLVEDOR ---
function abrirModoDesenvolvedor() {
    if (document.getElementById('devModal')) return;

    const devModal = document.createElement('div');
    devModal.id = 'devModal';
    devModal.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,10,0.95);z-index:9999;color:#00ff00;font-family:monospace;padding:20px;box-sizing:border-box;overflow-y:auto;';
    
    devModal.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #333;padding-bottom:10px;margin-bottom:20px;">
            <h2 style="margin:0;color:#fff;">🛠️ MODO DEV — PAINEL DE JOGOS</h2>
            <button onclick="document.getElementById('devModal').remove()" style="background:#ff4d4d;border:none;color:white;padding:8px 15px;cursor:pointer;font-weight:bold;font-family:monospace;">[FECHAR]</button>
        </div>
        
        <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
            <button onclick="trocarJogo('snake')" style="background:#222;color:#fff;border:1px solid #444;padding:10px 15px;cursor:pointer;">🐍 Snake</button>
            <button onclick="trocarJogo('history')" style="background:#222;color:#fff;border:1px solid #444;padding:10px 15px;cursor:pointer;">📜 Don't Forget History</button>
            <button onclick="trocarJogo('pong')" style="background:#222;color:#fff;border:1px solid #444;padding:10px 15px;cursor:pointer;">🏓 Ping Pong</button>
            <button onclick="trocarJogo('tictactoe')" style="background:#222;color:#fff;border:1px solid #444;padding:10px 15px;cursor:pointer;">❌ Jogo da Velha</button>
        </div>

        <div id="gameContainer" style="display:flex;justify-content:center;align-items:center;background:#050505;border:1px solid #333;min-height:450px;position:relative;border-radius:4px;padding:20px;">
            <p id="gamePlaceholder" style="color:#666;">Selecione um jogo no menu superior para iniciar o carregamento.</p>
        </div>
    `;

    document.body.appendChild(devModal);
    definirLogicaJogos();
}

// Global para limpar loops ativos ao trocar de jogo
let devGameInterval = null;

function trocarJogo(jogo) {
    if (devGameInterval) clearInterval(devGameInterval);
    document.onkeydown = null; 

    const container = document.getElementById('gameContainer');
    
    if (jogo === 'snake') {
        container.innerHTML = '<canvas id="snakeCanvas" width="400" height="400" style="border:2px solid #333; background:#000;"></canvas>';
        initSnake();
    } else if (jogo === 'history') {
        container.innerHTML = `
            <div style="text-align:center;">
                <div style="color:#aaa;margin-bottom:10px;font-size:14px;">Use as setas. Quadrado VERDE até o CINZA. Desvie do VERMELHO.</div>
                <canvas id="historyCanvas" width="400" height="400" style="border:2px solid #333; background:#1a1a1a;"></canvas>
            </div>
        `;
        initHistory();
    } else if (jogo === 'pong') {
        container.innerHTML = `
            <div style="text-align:center;">
                <div style="color:#aaa;margin-bottom:10px;font-size:14px;">Use as setas [CIMA] e [BAIXO] para mover sua raquete.</div>
                <canvas id="pongCanvas" width="600" height="400" style="border:2px solid #333; background:#000;"></canvas>
            </div>
        `;
        initPong();
    } else if (jogo === 'tictactoe') {
        container.innerHTML = `
            <div style="text-align:center;">
                <div style="color:#aaa;margin-bottom:15px;font-size:14px;">Jogo da Velha contra a Máquina (Você é X)</div>
                <div id="tttBoard" style="display:grid;grid-template-columns:repeat(3, 100px);gap:5px;margin:0 auto;width:310px;"></div>
                <h3 id="tttStatus" style="color:#fff;margin-top:15px;">Sua vez</h3>
            </div>
        `;
        initTicTacToe();
    }
}

function definirLogicaJogos() {
    // --- 1. JOGO SNAKE ---
    window.initSnake = function() {
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const box = 20;
        let snake = [{ x: 9 * box, y: 9 * box }];
        let direction = '';
        let food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };

        document.onkeydown = (e) => {
            if (e.keyCode == 37 && direction != 'RIGHT') direction = 'LEFT';
            else if (e.keyCode == 38 && direction != 'DOWN') direction = 'UP';
            else if (e.keyCode == 39 && direction != 'LEFT') direction = 'RIGHT';
            else if (e.keyCode == 40 && direction != 'UP') direction = 'DOWN';
        };

        devGameInterval = setInterval(() => {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 400, 400);
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? '#00ff00' : '#00aa00';
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.fillStyle = '#ff0000'; ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x; let snakeY = snake[0].y;
            if (direction == 'LEFT') snakeX -= box;
            if (direction == 'UP') snakeY -= box;
            if (direction == 'RIGHT') snakeX += box;
            if (direction == 'DOWN') snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
            } else { snake.pop(); }

            let newHead = { x: snakeX, y: snakeY };
            if (snakeX < 0 || snakeX > 19*box || snakeY < 0 || snakeY > 19*box || snake.some(s => s.x===newHead.x && s.y===newHead.y)) {
                clearInterval(devGameInterval); alert('Game Over!'); trocarJogo('snake');
            }
            snake.unshift(newHead);
        }, 100);
    };

    // --- 2. DON'T FORGET HISTORY ---
    window.initHistory = function() {
        const canvas = document.getElementById('historyCanvas');
        const ctx = canvas.getContext('2d');
        let player = { x: 20, y: 20, size: 20 };
        let target = { x: 340, y: 340, size: 40 };
        let obstacles = [{ x: 100, y: 0, w: 30, h: 250 }, { x: 220, y: 150, w: 30, h: 250 }, { x: 0, y: 300, w: 150, h: 30 }];

        document.onkeydown = (e) => {
            let step = 15; let nX = player.x; let nY = player.y;
            if (e.keyCode == 37) nX -= step; if (e.keyCode == 38) nY -= step;
            if (e.keyCode == 39) nX += step; if (e.keyCode == 40) nY += step;

            if (nX >= 0 && nX <= canvas.width - player.size && nY >= 0 && nY <= canvas.height - player.size) {
                let col = obstacles.some(o => nX < o.x + o.w && nX + player.size > o.x && nY < o.y + o.h && nY + player.size > o.y);
                if (!col) { player.x = nX; player.y = nY; }
            }
            if (player.x < target.x + target.size && player.x + player.size > target.x && player.y < target.y + target.size && player.y + player.size > target.y) {
                alert('História Relembrada! Vitória!'); player.x = 20; player.y = 20;
            }
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#888'; ctx.fillRect(target.x, target.y, target.size, target.size);
            ctx.fillStyle = '#ff3333'; obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
            ctx.fillStyle = '#00ff00'; ctx.fillRect(player.x, player.y, player.size, player.size);
            if(document.getElementById('historyCanvas')) requestAnimationFrame(draw);
        }
        draw();
    };

    // --- 3. PING PONG ---
    window.initPong = function() {
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');
        let padH = 80, padW = 10;
        let p1Y = 160, p2Y = 160;
        let ball = { x: 300, y: 200, vx: 4, vy: 4, r: 6 };
        let keys = {};

        document.onkeydown = (e) => keys[e.keyCode] = true;
        document.onkeyup = (e) => keys[e.keyCode] = false;

        devGameInterval = setInterval(() => {
            if (keys[38]) p1Y = Math.max(0, p1Y - 6);
            if (keys[40]) p1Y = Math.min(canvas.height - padH, p1Y + 6);
            
            // IA simples para o Player 2
            if (ball.y > p2Y + padH/2) p2Y = Math.min(canvas.height - padH, p2Y + 3.5);
            else p2Y = Math.max(0, p2Y - 3.5);

            ball.x += ball.vx; ball.y += ball.vy;
            if (ball.y <= 0 || ball.y >= canvas.height) ball.vy *= -1;

            if (ball.x <= padW + 10) {
                if (ball.y > p1Y && ball.y < p1Y + padH) { ball.vx *= -1.05; ball.x = padW + 11; }
                else if (ball.x < 0) { alert('Você perdeu!'); trocarJogo('pong'); }
            }
            if (ball.x >= canvas.width - padW - 10) {
                if (ball.y > p2Y && ball.y < p2Y + padH) { ball.vx *= -1.05; ball.x = canvas.width - padW - 11; }
                else if (ball.x > canvas.width) { alert('Ponto seu! Você venceu!'); trocarJogo('pong'); }
            }

            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff'; ctx.fillRect(10, p1Y, padW, padH);
            ctx.fillRect(canvas.width - 20, p2Y, padW, padH);
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
        }, 1000/60);
    };


// --- LÓGICA DO BANHEIRO ---
function sendToBathroom() {
    const name = document.getElementById('studentName').value.trim();
    if(!name) return;

    // Verificar se já saiu mais cedo (Bloqueio Gestão)
    if(db.earlyExits.includes(name)) {
        document.getElementById('bathroomMsg').innerHTML = `<div class="notice btn-danger">Saída bloqueada: Aluno já saiu hoje mais cedo</div>`;
        return;
    }

    const log = {
        name,
        time: new Date().toLocaleTimeString(),
        date: new Date().toLocaleDateString(),
        returned: false,
        timestamp: Date.now()
    };

    db.bathroomLogs.push(log);
    save();
    renderAll();
    document.getElementById('studentName').value = "";
}

function returnFromBathroom() {
    const name = prompt("Nome do aluno que voltou:");
    const record = db.bathroomLogs.find(l => l.name.toLowerCase() === name.toLowerCase() && !l.returned);
    if(record) {
        record.returned = true;
        save();
        renderAll();
    }
}

// --- LÓGICA DE PRESENÇA ---
function markAttendance(name, type) {
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    let msg = "";

    if(type === 'chegada') {
        if(timeStr <= "07:10") msg = "Chegada em horário normal";
        else if(timeStr >= "07:50") msg = "Chegada na segunda aula, atrasado";
        else msg = "Chegada com atraso leve";
    } else {
        if(timeStr >= "12:20") msg = "Saída em horário normal";
        else msg = "Saída antecipada registrada";
    }

    db.attendance.push({name, type, time: timeStr, msg, date: now.toLocaleDateString()});
    save();
    document.getElementById('presencaMsg').innerHTML = `<div class="notice info">${name}: ${msg}</div>`;
}

function markEarlyExit(name) {
    if(!db.earlyExits.includes(name)) {
        db.earlyExits.push(name);
        save();
        renderAll();
        alert(`Saída antecipada de ${name} bloqueada no sistema de banheiro.`);
    }
}

// --- RENDERIZAÇÃO ---
function renderAll() {
    // Lista Banheiro Ativa
    const activeList = document.getElementById('activeBathroomList');
    const currentlyOut = db.bathroomLogs.filter(l => !l.returned);
    activeList.innerHTML = currentlyOut.map(l => `<div class="list-item"><span>${l.name} (Saiu às ${l.time})</span><span class="pill">No banheiro</span></div>`).join('');

    // Lista Presença
    const attList = document.getElementById('studentAttendanceList');
    attList.innerHTML = students.map(s => `
        <div class="list-item">
            <strong>${s}</strong>
            <div class="btnbar">
                <button class="btn-primary" onclick="markAttendance('${s}', 'chegada')">Chegada</button>
                <button class="btn-warning" onclick="markAttendance('${s}', 'saida')">Saída</button>
                ${currentUser.role === 'gestao' ? `<button class="btn-danger" onclick="markEarlyExit('${s}')">Bloquear Banheiro (Saiu Cedo)</button>` : ''}
            </div>
        </div>
    `).join('');

    // Relatórios Gestão
    if(currentUser.role === 'gestao') {
        const reportB = document.getElementById('reportBathroom');
        // Agrupar saídas por nome
        const counts = {};
        db.bathroomLogs.forEach(l => counts[l.name] = (counts[l.name] || 0) + 1);

        reportB.innerHTML = Object.keys(counts).map(name => {
            let colorClass = "";
            if(counts[name] >= 3) colorClass = "status-red";
            else if(counts[name] >= 2) colorClass = "status-yellow";
            
            return `<div class="list-item ${colorClass}">
                <span>${name} - Saídas hoje: <strong>${counts[name]}</strong></span>
                ${counts[name] >= 3 ? '<span class="bg-red indicator"></span>' : (counts[name] >= 2 ? '<span class="bg-yellow indicator"></span>' : '')}
            </div>`;
        }).join('');
    }
}

// --- UTILITÁRIOS ---
function save() {
    localStorage.setItem('esc_acc', JSON.stringify(db.accounts));
    localStorage.setItem('esc_bath', JSON.stringify(db.bathroomLogs));
    localStorage.setItem('esc_att', JSON.stringify(db.attendance));
    localStorage.setItem('esc_early', JSON.stringify(db.earlyExits));
}

function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('hidden');
    document.getElementById('tabBtn' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
}

function toggleCreateAccount() {
    document.getElementById('createAccountSection').classList.toggle('hidden');
}

function logout() { location.reload(); }

</script>
</body>
</html>
